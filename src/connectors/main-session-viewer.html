<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessao Principal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1923;
  --surface: #1a2332;
  --surface2: #243447;
  --text: #e1e8ed;
  --text2: #8899a6;
  --accent: #1da1f2;
  --agent: #1e3a4f;
  --user: #1da1f2;
  --border: #2d3f50;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 60px;
}

.header-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  background: var(--accent);
  color: white;
}

.header-info { flex: 1; min-width: 0; }
.header-name { font-weight: 600; font-size: 16px; }
.header-status {
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.running { background: #4ade80; animation: pulse 2s infinite; }
.status-dot.offline { background: #6b7280; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Messages */
.messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.message {
  max-width: 85%;
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.45;
  word-wrap: break-word;
  position: relative;
}

.message.agent {
  align-self: flex-start;
  background: var(--agent);
  border-bottom-left-radius: 4px;
}

.message.user {
  align-self: flex-end;
  background: var(--user);
  color: white;
  border-bottom-right-radius: 4px;
}

.message.error {
  align-self: flex-start;
  background: rgba(220, 38, 38, 0.15);
  border: 1px solid rgba(220, 38, 38, 0.4);
  color: #fca5a5;
  border-bottom-left-radius: 4px;
}

.message .time {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  text-align: right;
  margin-top: 4px;
}

.message .connector-tag {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin-top: 2px;
}

.message code {
  background: rgba(0,0,0,0.3);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 13px;
}

.message pre {
  background: rgba(0,0,0,0.3);
  padding: 8px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 6px 0;
  font-size: 13px;
}

/* Compose bar */
.compose-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.input-area textarea {
  flex: 1;
  padding: 10px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 42px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text2); }

.input-area button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.1s;
}
.input-area button:hover { background: #2563eb; }
.input-area button:active { transform: scale(0.95); }
.input-area button svg { width: 20px; height: 20px; fill: currentColor; }

/* Typing indicator */
.typing-indicator {
  display: none;
  align-self: flex-start;
  padding: 8px 14px;
  background: var(--agent);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
}

.typing-indicator.visible { display: flex; gap: 4px; }

.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text2);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* Connection banner */
.connection-bar {
  display: none;
  text-align: center;
  padding: 6px;
  font-size: 12px;
  background: #b91c1c;
  color: white;
}

.connection-bar.visible { display: block; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 15px;
  text-align: center;
  padding: 40px;
}

.empty-state.hidden { display: none; }

/* Media messages */
.message:has(.audio-message),
.message:has(.image-message),
.message:has(.file-attachment) {
  white-space: normal;
  min-width: 260px;
}

.image-message {
  margin-bottom: 4px;
}

.image-message img {
  display: block;
  max-width: 100%;
  max-height: 300px;
  border-radius: 8px;
  cursor: pointer;
  object-fit: contain;
}

.image-fullscreen-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.image-fullscreen-overlay.visible {
  display: flex;
}

.image-fullscreen-overlay img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border-radius: 4px;
}

.audio-message {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.audio-message audio {
  display: block;
  width: 100%;
  min-width: 240px;
  height: 40px;
  border-radius: 8px;
}

.audio-transcription {
  margin: 4px 0 0 0;
  padding: 6px 10px;
  border-left: 3px solid var(--text2);
  color: var(--text2);
  font-size: 0.85em;
  font-style: italic;
  line-height: 1.4;
  white-space: pre-wrap;
}

.file-attachment {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  max-width: 280px;
  margin-bottom: 4px;
  text-decoration: none;
  color: inherit;
  transition: background 0.15s;
}

.file-attachment:hover {
  background: var(--border);
}

.file-attachment .file-icon {
  font-size: 1.5rem;
  flex-shrink: 0;
  line-height: 1;
}

.file-attachment .file-details {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
}

.file-attachment .file-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-attachment .file-type {
  font-size: 0.72rem;
  color: var(--text2);
  margin-top: 2px;
}
/* Tool-use terminal block — loaded from /static/tool-blocks.css */
</style>
<link rel="stylesheet" href="/static/tool-blocks.css">
</head>
<body>

<div class="header">
  <div class="header-icon" id="header-icon">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
  </div>
  <div class="header-info">
    <div class="header-name" id="header-name">Carregando...</div>
    <div class="header-status">
      <span class="status-dot offline" id="status-dot"></span>
      <span id="status-text">Conectando...</span>
    </div>
  </div>
</div>

<div class="connection-bar" id="connection-bar">Reconectando...</div>

<div class="messages" id="messages">
  <div class="empty-state" id="empty-state">Nenhuma mensagem ainda</div>
  <div class="typing-indicator" id="typing-indicator">
    <span></span><span></span><span></span>
  </div>
</div>

<div class="image-fullscreen-overlay" id="image-overlay" onclick="closeImageFullscreen()">
  <img id="fullscreen-img" src="" alt="">
</div>

<div class="compose-bar">
  <div class="input-area" id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Digite..."
      onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script src="/static/tool-blocks.js"></script>
<script>
// ==================== STATE ====================
var token = location.pathname.replace(/^\/m\//, '');
var ws = null;
var reconnectAttempts = 0;
var reconnectTimer = null;
var sessionName = 'Sessao Principal';
var pendingUserEcho = false;

document.title = sessionName;
document.getElementById('header-name').textContent = sessionName;

// ==================== RENDERING ====================
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderText(text) {
  var s = escapeHtml(text);
  // Code blocks
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });
  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*([^*]+)\*/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
  // Links
  s = s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#60a5fa">$1</a>');
  // Newlines
  s = s.replace(/\n/g, '<br>');
  return s;
}

// ==================== MEDIA RENDERING ====================

function getFileIcon(mimeType) {
  if (!mimeType) return '📄';
  if (mimeType.startsWith('text/')) return '📝';
  if (mimeType === 'application/pdf') return '📕';
  if (mimeType === 'application/json') return '📋';
  if (mimeType === 'application/xml' || mimeType === 'text/xml') return '📋';
  if (mimeType === 'application/javascript' || mimeType === 'text/javascript') return '📜';
  if (mimeType.startsWith('application/zip') || mimeType.includes('compressed') || mimeType.includes('zip')) return '🗜️';
  if (mimeType.startsWith('video/')) return '🎬';
  return '📎';
}

function getFileTypeLabel(mimeType) {
  if (!mimeType) return 'Arquivo';
  if (mimeType === 'text/plain') return 'Texto';
  if (mimeType === 'text/csv') return 'CSV';
  if (mimeType === 'text/html') return 'HTML';
  if (mimeType === 'application/pdf') return 'PDF';
  if (mimeType === 'application/json') return 'JSON';
  if (mimeType === 'application/xml' || mimeType === 'text/xml') return 'XML';
  if (mimeType === 'application/javascript' || mimeType === 'text/javascript') return 'JavaScript';
  var parts = mimeType.split('/');
  return parts[1] ? parts[1].toUpperCase().substring(0, 10) : 'Arquivo';
}

function renderMessageContent(text, audioUrl, imageUrls, fileInfos) {
  var html = '';
  var hasImages = imageUrls && imageUrls.length > 0;
  var hasFileInfos = fileInfos && fileInfos.length > 0;

  var displayText = text;
  if (hasFileInfos && displayText) {
    displayText = displayText.replace(/\n\n\[Conteúdo do arquivo "[^"]*"\]:[\s\S]*/g, '').trim();
  }

  // Image attachments
  if (hasImages) {
    for (var ii = 0; ii < imageUrls.length; ii++) {
      html += '<div class="image-message">';
      html += '<img src="' + imageUrls[ii] + '" alt="Imagem" loading="lazy" onclick="openImageFullscreen(this.src)">';
      html += '</div>';
    }
  }

  // Audio attachment
  if (audioUrl) {
    html += '<div class="audio-message">';
    html += '<audio controls preload="metadata" src="' + audioUrl + '"></audio>';
    if (displayText) {
      var isPlaceholder = /^O usuario enviou um audio/i.test(displayText) || displayText === '[audio]';
      if (!isPlaceholder) {
        var cleanText = displayText.replace(/^aqui\s+est[aá]\s+a\s+transcri[cç][aã]o.*?:\s*/i, '');
        cleanText = cleanText.replace(/^[""](.+)[""]$/, '$1');
        if (cleanText.trim()) {
          html += '<blockquote class="audio-transcription">' + renderText(cleanText) + '</blockquote>';
        }
      }
    }
    html += '</div>';
  }

  // File attachment cards
  if (hasFileInfos) {
    for (var fi = 0; fi < fileInfos.length; fi++) {
      var fi_info = fileInfos[fi];
      var fi_icon = getFileIcon(fi_info.mimeType);
      var fi_label = getFileTypeLabel(fi_info.mimeType);
      var fi_name = fi_info.name || 'arquivo';
      if (fi_info.url) {
        html += '<a class="file-attachment" href="' + fi_info.url + '" download="' + fi_name.replace(/"/g, '&quot;') + '" target="_blank">';
      } else {
        html += '<div class="file-attachment">';
      }
      html += '<span class="file-icon">' + fi_icon + '</span>';
      html += '<div class="file-details">';
      html += '<span class="file-name" title="' + fi_name.replace(/"/g, '&quot;') + '">' + escapeHtml(fi_name) + '</span>';
      html += '<span class="file-type">' + escapeHtml(fi_label) + '</span>';
      html += '</div>';
      html += fi_info.url ? '</a>' : '</div>';
    }
  }

  // If we had media, only show text if it's not a placeholder
  if (hasImages || audioUrl) {
    if (displayText && audioUrl && !hasImages) return html;
    if (displayText && hasImages) {
      var isImgPlaceholder = /^O usuario enviou (uma imagem|\d+ imagens)/i.test(displayText);
      var isAudioPlaceholder = /^O usuario enviou um audio/i.test(displayText);
      if (!isImgPlaceholder && !isAudioPlaceholder) {
        html += renderText(displayText);
      }
    }
    return html || renderText(displayText);
  }

  if (hasFileInfos) {
    if (displayText) html += renderText(displayText);
    return html || '';
  }

  return renderText(text);
}

function openImageFullscreen(src) {
  var overlay = document.getElementById('image-overlay');
  document.getElementById('fullscreen-img').src = src;
  overlay.classList.add('visible');
}

function closeImageFullscreen() {
  document.getElementById('image-overlay').classList.remove('visible');
}

// formatToolLine() and makeToolUseBlock() are loaded from /static/tool-blocks.js

function appendToolLine(text, timeStr) {
  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');
  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');
  var prevEl = typing.previousElementSibling;
  var block;
  if (prevEl && prevEl.classList.contains('tool-use-block')) {
    block = prevEl;
  } else {
    block = makeToolUseBlock();
    container.insertBefore(block, typing);
  }
  var body = block.querySelector('.terminal-body');
  var line = document.createElement('div');
  line.className = 'terminal-line';
  line.innerHTML = formatToolLine(text, timeStr);
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
  container.scrollTop = container.scrollHeight;
}

// ==================== MESSAGE RENDERING ====================

function appendMessage(text, role, messageType, audioUrl, imageUrls, fileInfos) {
  if (role === 'system' || messageType === 'system') return;

  if (messageType === 'tool_use') {
    var ts = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    appendToolLine(text, ts);
    return;
  }

  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');

  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');

  var div = document.createElement('div');
  var cssClass = messageType === 'error' ? 'error' : (role === 'user' ? 'user' : 'agent');
  div.className = 'message ' + cssClass;
  div.innerHTML = renderMessageContent(text, audioUrl, imageUrls, fileInfos);

  var time = document.createElement('div');
  time.className = 'time';
  time.textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  div.appendChild(time);

  container.insertBefore(div, typing);
  container.scrollTop = container.scrollHeight;
}

function appendHistoryMessage(msg) {
  var text = msg.content;
  var role = msg.role;
  var timestamp = msg.created_at;
  var messageType = msg.message_type;
  var connectorName = msg.connector_name;
  var audioUrl = msg.audio_url || null;
  var imageUrls = msg.image_urls || null;
  var fileInfos = msg.file_infos || null;

  // Parse image_urls if it's a JSON string
  if (imageUrls && typeof imageUrls === 'string') {
    try { imageUrls = JSON.parse(imageUrls); } catch(e) { imageUrls = [imageUrls]; }
  }
  // Parse file_infos if it's a JSON string
  if (fileInfos && typeof fileInfos === 'string') {
    try { fileInfos = JSON.parse(fileInfos); } catch(e) { fileInfos = null; }
  }

  if (role === 'system' || messageType === 'system') return;

  var timeStr = (timestamp ? new Date(timestamp) : new Date())
    .toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  if (messageType === 'tool_use') {
    appendToolLine(text, timeStr);
    return;
  }

  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');

  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');

  var div = document.createElement('div');
  var cssClass = messageType === 'error' ? 'error' : (role === 'user' ? 'user' : 'agent');
  div.className = 'message ' + cssClass;
  div.innerHTML = renderMessageContent(text, audioUrl, imageUrls, fileInfos);

  var time = document.createElement('div');
  time.className = 'time';
  time.textContent = timeStr;
  div.appendChild(time);

  // Show connector origin for user messages (whatsapp, web, main-viewer)
  if (role === 'user' && connectorName && connectorName !== 'main-viewer') {
    var tag = document.createElement('div');
    tag.className = 'connector-tag';
    tag.textContent = 'via ' + connectorName;
    div.appendChild(tag);
  }

  container.insertBefore(div, typing);
}

function setConnected(connected) {
  var dot = document.getElementById('status-dot');
  var text = document.getElementById('status-text');
  dot.className = 'status-dot ' + (connected ? 'running' : 'offline');
  text.textContent = connected ? 'Online' : 'Conectando...';
}

// ==================== WEBSOCKET ====================
function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/ws/main?t=' + encodeURIComponent(token);

  ws = new WebSocket(url);

  ws.onopen = function() {
    reconnectAttempts = 0;
    document.getElementById('connection-bar').classList.remove('visible');
    setConnected(true);
  };

  ws.onmessage = function(event) {
    var msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'message':
        // Skip echo for user messages already shown locally by sendMessage()
        if (msg.role === 'user' && pendingUserEcho) {
          pendingUserEcho = false;
          break;
        }
        appendMessage(msg.text, msg.role, msg.messageType);
        break;

      case 'session_history':
        // Clear existing messages to avoid duplicates on reconnect
        var container = document.getElementById('messages');
        var typing = document.getElementById('typing-indicator');
        while (container.firstChild && container.firstChild !== typing) {
          container.removeChild(container.firstChild);
        }
        var existingTools = document.querySelectorAll('.tool-block');
        for (var t = 0; t < existingTools.length; t++) {
          existingTools[t].parentNode.removeChild(existingTools[t]);
        }
        var empty = document.getElementById('empty-state');
        if (empty) empty.classList.remove('hidden');

        var msgs = msg.messages || [];
        for (var i = 0; i < msgs.length; i++) {
          appendHistoryMessage(msgs[i]);
        }
        container.scrollTop = container.scrollHeight;
        break;

      case 'session_info':
        if (msg.session) {
          if (msg.session.variantName) {
            sessionName = msg.session.variantName;
          } else if (msg.session.agentName) {
            sessionName = msg.session.agentName;
          }
          document.getElementById('header-name').textContent = sessionName;
          document.title = sessionName;
          setConnected(true);
        }
        break;

      case 'error':
        appendMessage(msg.text || 'Erro desconhecido', 'agent', 'error');
        break;
    }
  };

  ws.onclose = function() {
    setConnected(false);
    scheduleReconnect();
  };

  ws.onerror = function() {};
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectAttempts++;
  var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
  document.getElementById('connection-bar').classList.add('visible');
  document.getElementById('connection-bar').textContent = 'Reconectando...';
  reconnectTimer = setTimeout(function() {
    reconnectTimer = null;
    connect();
  }, delay);
}

// ==================== INPUT ====================

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();

  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  pendingUserEcho = true;
  appendMessage(text, 'user');

  ws.send(JSON.stringify({ type: 'message', text: text }));

  input.value = '';
  autoResize(input);
  input.focus();
}

// ==================== INIT ====================
connect();
</script>
