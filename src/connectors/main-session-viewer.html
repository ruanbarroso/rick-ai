<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessao Principal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0b1220;
  --surface: #111a2b;
  --surface2: #172036;
  --text: #e2e8f0;
  --text2: #64748b;
  --accent: #3b82f6;
  --accent-dim: rgba(59, 130, 246, 0.15);
  --agent: transparent;
  --user-border: #3b82f6;
  --border: #1e293b;
  --border-active: #334155;
  --danger: #ef4444;
  --amber: #f59e0b;
  --amber-hover: #fbbf24;
  --success: #22c55e;
  --tool-text: #94a3b8;
  --tool-icon: #3b82f6;
  --tool-arg: #22d3ee;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 52px;
}

.header-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  background: var(--accent);
  color: white;
}

.header-info { flex: 1; min-width: 0; }
.header-name { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
.header-status {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.running { background: var(--success); animation: pulse 2s infinite; }
.status-dot.typing { background: var(--accent); animation: pulse 2s infinite; }
.status-dot.offline { background: #475569; }
#status-text.online { color: var(--success); }
#status-text.typing { color: var(--accent); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Messages */
.messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
}

#scroll-bottom-btn {
  display: none;
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 50;
  opacity: 0.9;
  transition: opacity 0.15s, transform 0.15s;
}
#scroll-bottom-btn:hover { opacity: 1; background: var(--border-active); transform: translateX(-50%) scale(1.05); }

.message {
  max-width: 100%;
  padding: 10px 16px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  position: relative;
  flex-shrink: 0;
  border-radius: 6px;
}

.message.agent {
  align-self: stretch;
  background: transparent;
  padding-left: 16px;
  padding-right: 32px;
  margin-top: 4px;
}

.message.user {
  align-self: stretch;
  background: var(--surface);
  border-left: 3px solid var(--user-border);
  color: var(--text);
  padding-left: 14px;
  margin-top: 12px;
  margin-bottom: 4px;
}

.message.error {
  align-self: stretch;
  background: rgba(220, 38, 38, 0.08);
  border-left: 3px solid #ef4444;
  color: #fca5a5;
}

/* Model footer */
.message-footer {
  font-size: 11px;
  color: var(--text2);
  opacity: 0.5;
  margin-top: 4px;
  font-family: 'SF Mono', Consolas, monospace;
  letter-spacing: 0.02em;
}

/* Spacing */
.messages { gap: 4px; }
.message.agent { margin-top: 8px; padding-right: 16px; }
.message.user { margin-top: 16px; margin-bottom: 8px; }

/* Code blocks max-height + copy */
.message pre { max-height: 320px; overflow-y: auto; position: relative; }
.code-copy-btn {
  position: absolute; top: 4px; right: 4px;
  background: rgba(255,255,255,0.08); border: none; border-radius: 4px;
  padding: 3px 5px; cursor: pointer; opacity: 0;
  transition: opacity 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center; z-index: 2;
}
.message pre:hover .code-copy-btn { opacity: 0.7; }
.code-copy-btn:hover { opacity: 1; background: rgba(255,255,255,0.18); }
.code-copy-btn svg { width: 14px; height: 14px; fill: none; stroke: rgba(255,255,255,0.85); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.code-copy-btn.copied svg { stroke: #4ade80; }

/* Pensando... status line */
.tool-status-line {
  padding: 6px 16px; font-size: 13px; color: var(--text2);
  opacity: 0.5; font-style: italic;
}


.message .time {
  font-size: 11px;
  color: var(--text2);
  text-align: right;
  margin-top: 6px;
  opacity: 0.6;
}

.message .copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 4px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.message:hover .copy-btn { opacity: 0.7; }
.message .copy-btn:hover, .message .copy-btn:active { opacity: 1; background: rgba(255,255,255,0.18); }
.message .copy-btn svg { width: 16px; height: 16px; fill: none; stroke: rgba(255,255,255,0.85); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.message .copy-btn.copied svg { stroke: #4ade80; }

.message .connector-tag {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  margin-top: 2px;
}

/* Message rendering styles loaded from /static/message-styles.css */

/* Compose bar */
.compose-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.compose-attach {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, color 0.2s;
}
.compose-attach:hover { background: var(--surface2); color: var(--text); }

.input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.input-area textarea {
  flex: 1;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 42px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text2); }

.input-area button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.1s, color 0.2s;
}
.input-area button:hover { background: var(--border); color: var(--text); }
.input-area button:active { transform: scale(0.95); }
.input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
.input-area button.send-btn { background: var(--accent); color: white; }
.input-area button.send-btn:hover { background: #2563eb; }
.input-area button.send-btn.stop-mode { background: var(--danger); }
.input-area button.send-btn.stop-mode:hover { background: #dc2626; }
.input-area button.send-btn.interrupt-mode { background: var(--amber); }
.input-area button.send-btn.interrupt-mode:hover { background: var(--amber-hover); }
.input-area button.recording { background: #ef4444; color: white; animation: recPulse 1.5s infinite; }
.input-area button svg { width: 20px; height: 20px; fill: currentColor; }

@keyframes recPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}

/* Recording bar */
.recording-bar {
  display: none;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}
.recording-bar.visible { display: flex; }

.recording-cancel {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: transparent; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.recording-cancel:hover { background: var(--surface); color: var(--text); }

.recording-indicator { flex: 1; display: flex; align-items: center; gap: 8px; }
.recording-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; animation: recBlink 1s infinite; }
@keyframes recBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.recording-text { font-size: 0.85rem; color: var(--text2); }
.recording-timer { font-size: 0.85rem; color: var(--text); font-variant-numeric: tabular-nums; }

.recording-send {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--accent); color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s;
}
.recording-send:hover { background: #2563eb; }

/* Audio preview bar */
.audio-preview-bar {
  display: none;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.audio-preview-bar.visible { display: flex; }

.audio-preview-bar .audio-discard {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: transparent; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.audio-preview-bar .audio-discard:hover { background: #ef4444; color: white; }

.audio-preview-bar audio { flex: 1; height: 36px; min-width: 0; }

.audio-preview-bar .audio-send {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--accent); color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s;
}
.audio-preview-bar .audio-send:hover { background: #2563eb; }

/* Attachments preview */
.attachments-preview {
  display: none;
  padding: 8px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.attachments-preview.visible { display: flex; }

.attachment-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 8px; max-width: 180px;
}
.attachment-chip img {
  width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0;
}
.attachment-chip .chip-name {
  font-size: 0.78rem; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.attachment-chip .chip-remove {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 1rem; padding: 0; width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0; line-height: 1;
}
.attachment-chip .chip-remove:hover { background: #ef4444; color: white; }

#file-input { display: none; }

/* Typing indicator — hidden, kept as DOM anchor for insertBefore */
.typing-indicator { display: none; }

/* Connection banner */
.connection-bar {
  display: none;
  text-align: center;
  padding: 4px;
  font-size: 11px;
  background: rgba(185, 28, 28, 0.8);
  color: white;
}

.connection-bar.visible { display: block; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 15px;
  text-align: center;
  padding: 40px;
}

.empty-state.hidden { display: none; }



@media (max-width: 640px) {
  .compose-bar {
    flex-wrap: wrap;
    align-items: stretch;
    gap: 8px;
    padding: 8px 10px;
  }

  .compose-attach {
    width: 38px;
    height: 38px;
    flex: 0 0 38px;
  }

  .input-area,
  .recording-bar,
  .audio-preview-bar {
    flex: 1 1 100%;
    width: 100%;
  }

  .input-area textarea {
    min-height: 38px;
    padding: 8px 12px;
    font-size: 16px;
  }

  .input-area button,
  .recording-send,
  .audio-send {
    width: 38px;
    height: 38px;
  }

  .audio-preview-bar audio {
    min-width: 0;
    width: 100%;
  }

  .attachment-chip {
    max-width: 100%;
  }

  #scroll-bottom-btn {
    bottom: 110px;
  }

  .messages {
    padding: 12px 10px;
  }

  .message {
    padding: 8px 10px;
    font-size: 13px;
  }

  .message.agent {
    padding-right: 10px;
    padding-left: 10px;
  }

  .message pre {
    font-size: 0.75em;
    padding: 8px 10px;
    max-height: 200px;
  }

  .tool-status-line {
    padding: 4px 10px;
    font-size: 12px;
  }
}
/* Tool-use terminal block — loaded from /static/tool-blocks.css */
</style>

  </div>
  <div class="header-info">
    <div class="header-name" id="header-name">Carregando...</div>
    <div class="header-status">
      <span class="status-dot offline" id="status-dot"></span>
      <span id="status-text">Conectando...</span>

</div>

<div class="connection-bar" id="connection-bar">Reconectando...</div>

<div class="messages" id="messages">
  <div class="empty-state" id="empty-state">Nenhuma mensagem ainda</div>
  <div class="typing-indicator" id="typing-indicator">
    <span></span><span></span><span></span>
  </div>
</div>

<button id="scroll-bottom-btn" onclick="scrollToBottom(true)" title="Ir para o final" aria-label="Ir para o final">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
</button>

<div class="image-fullscreen-overlay" id="image-overlay" onclick="closeImageFullscreen()">
  <img id="fullscreen-img" src="" alt="">
</div>

<div class="attachments-preview" id="attachments-preview"></div>

<div class="compose-bar">
  <button id="attach-btn" class="compose-attach" onclick="document.getElementById('file-input').click()" title="Anexar arquivos">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
  </button>
  <input type="file" id="file-input" multiple onchange="handleFileSelect(event)" style="display:none">

  <div class="recording-bar" id="recording-bar">

  <div class="audio-preview-bar" id="audio-preview-bar">

      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="input-area" id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Digite..."
      onkeydown="handleKeyDown(event)" oninput="autoResize(this)" onpaste="handlePaste(event)"></textarea>
    <button id="mic-btn" onclick="startRecording()" title="Gravar audio">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar">

    </button>
  </div>
</div>

<script>
// ==================== STATE ====================
var token = location.pathname.replace(/^\/m\//, '');
var ws = null;
var reconnectAttempts = 0;
var reconnectTimer = null;
var sessionName = 'Sessao Principal';
var pendingUserEcho = false;
var pendingAudioEcho = false;
var pendingImageEcho = false;
var pendingFileEcho = false;
var sendInFlight = false;
var isProcessing = false; // true when Rick is processing (typing indicator visible)

// Audio recording state
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;
var recordingCanceled = false;
var recordingStartedAt = 0;
var recordingTimerInterval = null;
var pendingAudio = null;        // { blob, mimeType, localUrl }

// File attachment state
var pendingFiles = [];          // { base64, mimeType, name, previewUrl }
var pendingFileReads = [];      // in-flight FileReader promises

document.title = sessionName;
document.getElementById('header-name').textContent = sessionName;

// ==================== SCROLL TO BOTTOM ====================
function isAtBottom() {
  var container = document.getElementById('messages');
  return container.scrollHeight - container.scrollTop - container.clientHeight < 80;
}

function formatTimestamp(date) {
  if (!date) date = new Date();
  var y = date.getFullYear();
  var m = String(date.getMonth() + 1).padStart(2, '0');
  var d = String(date.getDate()).padStart(2, '0');
  var h = String(date.getHours()).padStart(2, '0');
  var min = String(date.getMinutes()).padStart(2, '0');
  var s = String(date.getSeconds()).padStart(2, '0');
  return y + '-' + m + '-' + d + ' ' + h + ':' + min + ':' + s;
}

function scrollToBottom(force) {
  var container = document.getElementById('messages');
  if (force || isAtBottom()) {
    requestAnimationFrame(function() {
      container.scrollTop = container.scrollHeight;
      var btn = document.getElementById('scroll-bottom-btn');
      if (btn) btn.style.display = 'none';
    });
  }
}

(function() {
  var messagesEl = document.getElementById('messages');
  var btn = document.getElementById('scroll-bottom-btn');
  if (messagesEl && btn) {
    messagesEl.addEventListener('scroll', function() {
      btn.style.display = isAtBottom() ? 'none' : 'flex';
    });
  }
})();

// ==================== RENDERING ====================
// escapeHtml(), renderText(), renderMessageContent(), getFileIcon(), getFileTypeLabel(),
// openImageFullscreen(), closeImageFullscreen() are loaded from /static/render-text.js

// formatToolLine(), makeToolUseBlock(), isStatusLine(), _trackToolCall()
// are loaded from /static/tool-blocks.js
// Fallbacks in case the cached JS is stale:
if (typeof isStatusLine === 'undefined') { window.isStatusLine = function() { return false; }; }
if (typeof _trackToolCall === 'undefined') { window._trackToolCall = function() {}; }

function appendToolLine(text, timeStr) {
  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');
  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');

  // "Pensando..." — render as separate status element
  if (isStatusLine(text)) {
    var prevStatus = typing.previousElementSibling;
    if (prevStatus && prevStatus.classList.contains('tool-status-line')) {
      prevStatus.parentNode.removeChild(prevStatus);
    }
    var statusDiv = document.createElement('div');
    statusDiv.className = 'tool-status-line';
    statusDiv.textContent = 'Pensando \u2026';
    container.insertBefore(statusDiv, typing);
    scrollToBottom();
    return;
  }

  // Remove lingering status line
  var prevSibling = typing.previousElementSibling;
  if (prevSibling && prevSibling.classList.contains('tool-status-line')) {
    prevSibling.parentNode.removeChild(prevSibling);
  }

  var prevEl = typing.previousElementSibling;
  var block;
  if (prevEl && prevEl.classList.contains('tool-use-block')) {
    block = prevEl;
  } else {
    block = makeToolUseBlock();
    container.insertBefore(block, typing);
  }

  _trackToolCall(block, text);

  var body = block.querySelector('.terminal-body');

  // MERGE: if this is a completed/error line, update the matching start line in-place
  if (isToolCompleted(text)) {
    var completedName = extractToolName(text);
    var lines = body.querySelectorAll('.terminal-line[data-tool-state="running"]');
    for (var li = lines.length - 1; li >= 0; li--) {
      if (lines[li].getAttribute('data-tool-name') === completedName) {
        lines[li].innerHTML = formatToolLine(text, timeStr);
        lines[li].setAttribute('data-tool-state', isToolError(text) ? 'error' : 'done');
        body.scrollTop = body.scrollHeight;
        scrollToBottom();
        return;
      }
    }
  }

  var line = document.createElement('div');
  line.className = 'terminal-line';
  line.innerHTML = formatToolLine(text, timeStr);
  if (isToolStart(text)) {
    line.setAttribute('data-tool-state', 'running');
    line.setAttribute('data-tool-name', extractToolName(text));
  } else if (isToolCompleted(text)) {
    line.setAttribute('data-tool-state', isToolError(text) ? 'error' : 'done');
  }
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
  scrollToBottom();
}

function isExecutionFailureText(text) {
  return String(text || '').toLowerCase().indexOf('falha operacional: esta rodada exigia execucao') === 0;
}

function addCopyButton(div, rawText) {
  var btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.title = 'Copiar mensagem';
  btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  btn.onclick = function(e) {
    e.stopPropagation();
    navigator.clipboard.writeText(rawText.trim()).then(function() {
      btn.classList.add('copied');
      setTimeout(function() { btn.classList.remove('copied'); }, 1500);
    });
  };
  div.appendChild(btn);
}

function addCodeBlockCopyButtons(msgDiv) {
  var pres = msgDiv.querySelectorAll('pre');
  for (var i = 0; i < pres.length; i++) {
    (function(pre) {
      pre.style.position = 'relative';
      var code = pre.querySelector('code');
      if (!code) return;
      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.title = 'Copiar codigo';
      btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      btn.onclick = function(e) {
        e.stopPropagation();
        navigator.clipboard.writeText(code.textContent.trim()).then(function() {
          btn.classList.add('copied');
          setTimeout(function() { btn.classList.remove('copied'); }, 1500);
        });
      };
      pre.appendChild(btn);
    })(pres[i]);
  }
}

function appendMessage(text, role, messageType, audioUrl, imageUrls, fileInfos) {
  if (role === 'system' || messageType === 'system') return;

  if (messageType === 'tool_use') {
    var ts = formatTimestamp();
    appendToolLine(text, ts);
    return;
  }

  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');

  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');

  // Remove lingering "Pensando..." status line and minimize previous tool block
  var prevStatus = typing.previousElementSibling;
  if (prevStatus && prevStatus.classList.contains('tool-status-line')) {
    prevStatus.parentNode.removeChild(prevStatus);
  }
  var prevBlock = typing.previousElementSibling;
  if (prevBlock && prevBlock.classList.contains('tool-use-block') && !prevBlock.classList.contains('minimized')) {
    _minimizeBlock(prevBlock);
  }

  var div = document.createElement('div');
  var cssClass = (messageType === 'error' || isExecutionFailureText(text)) ? 'error' : (role === 'user' ? 'user' : 'agent');
  div.className = 'message ' + cssClass;
  div.innerHTML = renderMessageContent(text, audioUrl, imageUrls, fileInfos);

  var time = document.createElement('div');
  time.className = 'time';
  time.textContent = formatTimestamp();
  div.appendChild(time);

  if (cssClass !== 'error') addCopyButton(div, text);
  addCodeBlockCopyButtons(div);

  container.insertBefore(div, typing);
  scrollToBottom();
}

function appendHistoryMessage(msg) {
  var text = msg.content;
  var role = msg.role;
  var timestamp = msg.created_at;
  var messageType = msg.message_type;
  var connectorName = msg.connector_name;
  var audioUrl = msg.audio_url || null;
  var imageUrls = msg.image_urls || null;
  var fileInfos = msg.file_infos || null;

  // Parse image_urls if it's a JSON string
  if (imageUrls && typeof imageUrls === 'string') {
    try { imageUrls = JSON.parse(imageUrls); } catch(e) { imageUrls = [imageUrls]; }
  }
  // Parse file_infos if it's a JSON string
  if (fileInfos && typeof fileInfos === 'string') {
    try { fileInfos = JSON.parse(fileInfos); } catch(e) { fileInfos = null; }
  }

  if (role === 'system' || messageType === 'system') return;

  var timeStr = formatTimestamp(timestamp ? new Date(timestamp) : new Date());

  // Tool use → terminal block (skip status lines like "Pensando ..." in history)
  if (messageType === 'tool_use') {
    if (isStatusLine(text)) return;
    appendToolLine(text, timeStr);
    return;
  }

  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');

  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');

  // Minimize previous tool block and remove lingering status line
  var prev = typing.previousElementSibling;
  if (prev && prev.classList.contains('tool-status-line')) {
    prev.parentNode.removeChild(prev);
  }
  prev = typing.previousElementSibling;
  if (prev && prev.classList.contains('tool-use-block') && !prev.classList.contains('minimized')) {
    _minimizeBlock(prev);
  }

  var div = document.createElement('div');
  var cssClass = (messageType === 'error' || isExecutionFailureText(text)) ? 'error' : (role === 'user' ? 'user' : 'agent');
  div.className = 'message ' + cssClass;
  div.innerHTML = renderMessageContent(text, audioUrl, imageUrls, fileInfos);

  var time = document.createElement('div');
  time.className = 'time';
  time.textContent = timeStr;
  div.appendChild(time);

  // Show connector origin for user messages (whatsapp, web, main-viewer)
  if (role === 'user' && connectorName && connectorName !== 'main-viewer') {
    var tag = document.createElement('div');
    tag.className = 'connector-tag';
    tag.textContent = 'via ' + connectorName;
    div.appendChild(tag);
  }

  if (cssClass !== 'error') addCopyButton(div, text);
  addCodeBlockCopyButtons(div);

  container.insertBefore(div, typing);
}

function handleTranscription(audioUrl, transcription) {
  if (!audioUrl || !transcription) return;

  // Clean transcription text (strip Gemini prefix + wrapping quotes)
  var cleanText = transcription.replace(/^aqui\s+est[aá]\s+a\s+transcri[cç][aã]o.*?:\s*/i, '');
  cleanText = cleanText.replace(/^[""\u201C](.+)[""\u201D]$/, '$1').trim();
  if (!cleanText) return;

  // Find audio elements in the messages container by matching src URL
  var container = document.getElementById('messages');
  var audioDivs = container.querySelectorAll('.message.user .audio-message');
  var matched = false;

  for (var j = audioDivs.length - 1; j >= 0; j--) {
    var audioMsg = audioDivs[j];
    var audioEl = audioMsg.querySelector('audio');
    if (audioEl) {
      var src = audioEl.getAttribute('src') || '';
      if (src !== audioUrl && src.indexOf(audioUrl) === -1) continue;
    }
    // Found a matching audio element — update or create the transcription blockquote
    var existingBq = audioMsg.querySelector('.audio-transcription');
    if (existingBq && existingBq.classList.contains('processing')) {
      existingBq.classList.remove('processing');
      existingBq.innerHTML = renderText(cleanText);
      matched = true;
      break;
    } else if (!existingBq) {
      var bq = document.createElement('blockquote');
      bq.className = 'audio-transcription';
      bq.innerHTML = renderText(cleanText);
      audioMsg.appendChild(bq);
      matched = true;
      break;
    }
  }

  // Fallback: update the last processing audio (handles cases where URL doesn't match)
  if (!matched) {
    for (var jj = audioDivs.length - 1; jj >= 0; jj--) {
      var audioMsg2 = audioDivs[jj];
      var existingBq2 = audioMsg2.querySelector('.audio-transcription.processing');
      if (existingBq2) {
        existingBq2.classList.remove('processing');
        existingBq2.innerHTML = renderText(cleanText);
        break;
      }
    }
  }

  scrollToBottom();
}

function setConnected(connected) {
  var dot = document.getElementById('status-dot');
  var text = document.getElementById('status-text');
  dot.className = 'status-dot ' + (connected ? 'running' : 'offline');
  text.textContent = connected ? 'Online' : 'Conectando...';
  text.className = connected ? 'online' : '';
  if (!connected) {
    document.getElementById('typing-indicator').classList.remove('visible');
  }
}

// ==================== WEBSOCKET ====================
function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/ws/main?t=' + encodeURIComponent(token);

  ws = new WebSocket(url);

  ws.onopen = function() {
    reconnectAttempts = 0;
    document.getElementById('connection-bar').classList.remove('visible');
    setConnected(true);
  };

  ws.onmessage = function(event) {
    var msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'message':
        // Skip echo for user messages already shown locally by sendMessage()
        if (msg.role === 'user' && pendingUserEcho) {
          pendingUserEcho = false;
          // Update local preview with server URLs if available
          break;
        }
        // Hide typing indicator client-side when agent message arrives,
        // in case the 'typing:false' event was delivered before the message.
        if (msg.role === 'agent') {
          var typingEl = document.getElementById('typing-indicator');
          typingEl.classList.remove('visible');
          var statusText = document.getElementById('status-text');
          statusText.textContent = 'Online';
          statusText.className = 'online';
          var statusDot = document.getElementById('status-dot');
          statusDot.className = 'status-dot running';
          isProcessing = false;
          updateSendButton();
        }
        appendMessage(msg.text, msg.role, msg.messageType, msg.audioUrl || null, msg.imageUrls || null, msg.fileInfos || null);
        break;

      case 'session_history':
        // Clear existing messages to avoid duplicates on reconnect
        var container = document.getElementById('messages');
        var typing = document.getElementById('typing-indicator');
        while (container.firstChild && container.firstChild !== typing) {
          container.removeChild(container.firstChild);
        }
        var existingTools = document.querySelectorAll('.tool-block');
        for (var t = 0; t < existingTools.length; t++) {
          existingTools[t].parentNode.removeChild(existingTools[t]);
        }
        var empty = document.getElementById('empty-state');
        if (empty) empty.classList.remove('hidden');

        var msgs = msg.messages || [];
        for (var i = 0; i < msgs.length; i++) {
          appendHistoryMessage(msgs[i]);
        }
        scrollToBottom(true);
        break;

      case 'session_info':
        if (msg.session) {
          if (msg.session.variantName) {
            sessionName = msg.session.variantName;
          } else if (msg.session.agentName) {
            sessionName = msg.session.agentName;
          }
          document.getElementById('header-name').textContent = sessionName;
          document.title = sessionName;
          setConnected(true);
        }
        break;

      case 'typing':
        var typingEl = document.getElementById('typing-indicator');
        var statusText = document.getElementById('status-text');
        isProcessing = msg.composing;
        var statusDot = document.getElementById('status-dot');
        if (msg.composing) {
          typingEl.classList.add('visible');
          statusText.textContent = 'Digitando...';
          statusText.className = 'typing';
          statusDot.className = 'status-dot typing';
          // Auto-scroll to show typing indicator
          scrollToBottom();
        } else {
          typingEl.classList.remove('visible');
          statusText.textContent = 'Online';
          statusText.className = 'online';
          statusDot.className = 'status-dot running';
        }
        updateSendButton();
        break;

      case 'transcription':
        handleTranscription(msg.audioUrl, msg.text);
        break;

      case 'error':
        appendMessage(msg.text || 'Erro desconhecido', 'agent', 'error');
        break;
    }
  };

  ws.onclose = function() {
    setConnected(false);
    scheduleReconnect();
  };

  ws.onerror = function() {};
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectAttempts++;
  var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
  document.getElementById('connection-bar').classList.add('visible');
  document.getElementById('connection-bar').textContent = 'Reconectando...';
  reconnectTimer = setTimeout(function() {
    reconnectTimer = null;
    connect();
  }, delay);
}

// ==================== AUDIO RECORDING ====================

function readEbmlVint(bytes, offset) {
  var first = bytes[offset];
  if (first >= 0x80) return { value: first & 0x7F, length: 1 };
  if (first >= 0x40) return { value: ((first & 0x3F) << 8) | bytes[offset + 1], length: 2 };
  if (first >= 0x20) return { value: ((first & 0x1F) << 16) | (bytes[offset + 1] << 8) | bytes[offset + 2], length: 3 };
  if (first >= 0x10) return { value: ((first & 0x0F) << 24) | (bytes[offset + 1] << 16) | (bytes[offset + 2] << 8) | bytes[offset + 3], length: 4 };
  return { value: -1, length: 8 };
}

async function fixWebmDuration(blob, durationMs) {
  if (!blob || !(durationMs > 0)) return blob;
  try {
    var buf = await blob.arrayBuffer();
    var bytes = new Uint8Array(buf);
    var siStart = -1;
    for (var i = 0; i < Math.min(bytes.length - 8, 4096); i++) {
      if (bytes[i] === 0x15 && bytes[i+1] === 0x49 && bytes[i+2] === 0xA9 && bytes[i+3] === 0x66) {
        siStart = i; break;
      }
    }
    if (siStart === -1) return blob;
    var vint = readEbmlVint(bytes, siStart + 4);
    var siDataStart = siStart + 4 + vint.length;
    var scanLimit = Math.min(siDataStart + 512, bytes.length - 11);
    for (var j = siDataStart; j < scanLimit; j++) {
      if (bytes[j] === 0x44 && bytes[j + 1] === 0x89) {
        if (bytes[j + 2] === 0x88) {
          var dv = new DataView(buf);
          var existing = dv.getFloat64(j + 3, false);
          if (existing > 0 && isFinite(existing)) return blob;
          var copy = new Uint8Array(buf.slice(0));
          new DataView(copy.buffer).setFloat64(j + 3, durationMs, false);
          return new Blob([copy], { type: blob.type });
        }
        return blob;
      }
    }
    var durEl = new Uint8Array(11);
    durEl[0] = 0x44; durEl[1] = 0x89; durEl[2] = 0x88;
    new DataView(durEl.buffer).setFloat64(3, durationMs, false);
    var result = new Uint8Array(bytes.length + 11);
    result.set(bytes.subarray(0, siDataStart), 0);
    result.set(durEl, siDataStart);
    result.set(bytes.subarray(siDataStart), siDataStart + 11);
    var vintValue = vint.value;
    var isUnknownSize = vintValue === -1 ||
      (vint.length === 1 && vintValue === 0x7F) ||
      (vint.length === 2 && vintValue === 0x3FFF) ||
      (vint.length === 3 && vintValue === 0x1FFFFF) ||
      (vint.length === 4 && vintValue === 0x0FFFFFFF);
    if (!isUnknownSize) {
      var newSize = vintValue + 11;
      var voff = siStart + 4;
      if (vint.length === 1) result[voff] = 0x80 | newSize;
      else if (vint.length === 2) { result[voff] = 0x40 | (newSize >> 8); result[voff+1] = newSize & 0xFF; }
      else if (vint.length === 3) { result[voff] = 0x20 | (newSize >> 16); result[voff+1] = (newSize >> 8) & 0xFF; result[voff+2] = newSize & 0xFF; }
      else if (vint.length === 4) { result[voff] = 0x10 | (newSize >> 24); result[voff+1] = (newSize >> 16) & 0xFF; result[voff+2] = (newSize >> 8) & 0xFF; result[voff+3] = newSize & 0xFF; }
    }
    return new Blob([result], { type: blob.type });
  } catch (e) {
    return blob;
  }
}

function updateRecordingTimer() {
  var elapsed = Math.floor((Date.now() - recordingStartedAt) / 1000);
  var min = Math.floor(elapsed / 60);
  var sec = elapsed % 60;
  document.getElementById('recording-timer').textContent = min + ':' + (sec < 10 ? '0' + sec : sec);
}

function startRecording() {
  if (isRecording) return;
  if (pendingAudio) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    var mimeType = 'audio/webm';
    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
    else if (MediaRecorder.isTypeSupported('audio/webm')) mimeType = 'audio/webm';
    else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';

    mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
    audioChunks = [];
    recordingCanceled = false;

    mediaRecorder.ondataavailable = function(e) {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      if (recordingCanceled) { audioChunks = []; showInputArea(); return; }
      var blob = new Blob(audioChunks, { type: mimeType });
      var durationMs = Date.now() - recordingStartedAt;
      if (mimeType.indexOf('webm') !== -1) blob = await fixWebmDuration(blob, durationMs);
      var localUrl = URL.createObjectURL(blob);
      pendingAudio = { blob: blob, mimeType: mimeType, localUrl: localUrl };
      var player = document.getElementById('audio-preview-player');
      player.src = localUrl;
      document.getElementById('recording-bar').classList.remove('visible');
      document.getElementById('audio-preview-bar').classList.add('visible');
    };

    mediaRecorder.start();
    isRecording = true;
    recordingStartedAt = Date.now();
    updateRecordingTimer();
    if (recordingTimerInterval) clearInterval(recordingTimerInterval);
    recordingTimerInterval = setInterval(updateRecordingTimer, 1000);
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('recording-bar').classList.add('visible');
  }).catch(function(err) {
    console.error('Mic error:', err);
  });
}

function finishRecording() {
  if (!isRecording) return;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  if (recordingTimerInterval) { clearInterval(recordingTimerInterval); recordingTimerInterval = null; }
}

function cancelRecording() {
  if (!isRecording) return;
  recordingCanceled = true;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  if (recordingTimerInterval) { clearInterval(recordingTimerInterval); recordingTimerInterval = null; }
}

function discardAudio() {
  if (pendingAudio) { URL.revokeObjectURL(pendingAudio.localUrl); pendingAudio = null; }
  var player = document.getElementById('audio-preview-player');
  player.pause(); player.src = '';
  showInputArea();
}

// ==================== FILE ATTACHMENTS ====================

function handleFileSelect(event) {
  var files = event.target.files;
  if (!files || files.length === 0) return;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var readPromise = new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var base64 = e.target.result.split(',')[1];
          var isImage = file.type.startsWith('image/');
          pendingFiles.push({
            base64: base64,
            mimeType: file.type || 'application/octet-stream',
            name: file.name,
            previewUrl: isImage ? e.target.result : null
          });
          renderAttachmentsPreviews();
          resolve();
        };
        reader.onerror = function() { resolve(); };
        reader.readAsDataURL(file);
      });
      pendingFileReads.push(readPromise);
    })(files[i]);
  }
  event.target.value = '';
}

function handlePaste(event) {
  var items = event.clipboardData && event.clipboardData.items;
  if (!items) return;
  var hasImage = false;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      hasImage = true;
      (function(item) {
        var file = item.getAsFile();
        if (!file) return;
        var mimeType = item.type || file.type || 'image/png';
        var ext = mimeType.split('/')[1] || 'png';
        var name = 'imagem_' + Date.now() + '.' + ext;
        var readPromise = new Promise(function(resolve) {
          var reader = new FileReader();
          reader.onload = function(e) {
            var base64 = e.target.result.split(',')[1];
            pendingFiles.push({ base64: base64, mimeType: mimeType, name: name, previewUrl: e.target.result });
            renderAttachmentsPreviews();
            resolve();
          };
          reader.onerror = function() { resolve(); };
          reader.readAsDataURL(file);
        });
        pendingFileReads.push(readPromise);
      })(items[i]);
    }
  }
  if (hasImage) event.preventDefault();
}

function renderAttachmentsPreviews() {
  var container = document.getElementById('attachments-preview');
  if (pendingFiles.length === 0) {
    container.classList.remove('visible');
    container.innerHTML = '';
    return;
  }
  container.classList.add('visible');
  var html = '';
  for (var i = 0; i < pendingFiles.length; i++) {
    var f = pendingFiles[i];
    html += '<div class="attachment-chip">';
    if (f.previewUrl) {
      html += '<img src="' + f.previewUrl + '" alt="" onclick="event.stopPropagation(); openImageFullscreen(this.src)" style="cursor:pointer">';
    } else {
      html += '<span style="font-size:1.4rem;flex-shrink:0;">' + getFileIcon(f.mimeType) + '</span>';
    }
    html += '<span class="chip-name">' + escapeHtml(f.name) + '</span>';
    html += '<button class="chip-remove" onclick="removeFile(' + i + ')" title="Remover">&times;</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function removeFile(index) {
  pendingFiles.splice(index, 1);
  renderAttachmentsPreviews();
}

function clearAllFiles() {
  pendingFiles = [];
  renderAttachmentsPreviews();
}

function blobToBase64(blob) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
    reader.readAsDataURL(blob);
  });
}

async function waitForPendingFileReads() {
  if (pendingFileReads.length === 0) return;
  var reads = pendingFileReads.slice();
  pendingFileReads = [];
  await Promise.allSettled(reads);
  if (pendingFileReads.length > 0) await waitForPendingFileReads();
}

// ==================== SEND MESSAGE ====================

async function sendMessage() {
  if (sendInFlight) return;
  sendInFlight = true;
  try {
    var input = document.getElementById('msg-input');
    var text = input.value.trim();

    // Handle stop/interrupt when processing
    if (isProcessing) {
      if (!text) {
        // Stop button: just interrupt, no new message
        sendInterrupt();
        return;
      }
      // Amber button: interrupt first, then send new message
      sendInterrupt();
    }

    if (isRecording) return;

    if (pendingFileReads.length > 0) await waitForPendingFileReads();

    var hasAudio = !!pendingAudio;
    var hasFiles = pendingFiles.length > 0;

    var imageFiles = [];
    var nonImageFiles = [];
    for (var fi = 0; fi < pendingFiles.length; fi++) {
      if (pendingFiles[fi].mimeType.startsWith('image/')) imageFiles.push(pendingFiles[fi]);
      else nonImageFiles.push(pendingFiles[fi]);
    }

    if (!text && !hasAudio && !hasFiles) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    // Build local URLs for immediate display
    var localAudioUrl = hasAudio ? pendingAudio.localUrl : null;
    var localImageUrls = [];
    for (var li = 0; li < imageFiles.length; li++) {
      localImageUrls.push('data:' + imageFiles[li].mimeType + ';base64,' + imageFiles[li].base64);
    }
    var localFileInfos = [];
    for (var lf = 0; lf < nonImageFiles.length; lf++) {
      localFileInfos.push({ url: null, name: nonImageFiles[lf].name || 'arquivo', mimeType: nonImageFiles[lf].mimeType });
    }

    // Show message locally immediately
    pendingUserEcho = true;
    appendMessage(text || '', 'user', null,
      localAudioUrl,
      localImageUrls.length > 0 ? localImageUrls : null,
      localFileInfos.length > 0 ? localFileInfos : null
    );

    // Show typing indicator immediately
    document.getElementById('typing-indicator').classList.add('visible');
    document.getElementById('status-text').textContent = 'Digitando...';

    // Build payload
    var payload = { type: 'message', text: text };

    var filesPayload = [];
    for (var fp = 0; fp < pendingFiles.length; fp++) {
      filesPayload.push({ base64: pendingFiles[fp].base64, mimeType: pendingFiles[fp].mimeType, name: pendingFiles[fp].name });
    }

    if (hasAudio) {
      var base64 = await blobToBase64(pendingAudio.blob);
      payload.audio = base64;
      payload.audioMimeType = pendingAudio.mimeType.split(';')[0];
      if (filesPayload.length > 0) payload.files = filesPayload;
    } else if (filesPayload.length > 0) {
      payload.files = filesPayload;
    }

    ws.send(JSON.stringify(payload));

    // Cleanup
    if (hasAudio) {
      pendingAudio = null;
      var aplayer = document.getElementById('audio-preview-player');
      aplayer.pause(); aplayer.src = '';
    }
    if (hasFiles) clearAllFiles();
    input.value = '';
    autoResize(input);
    showInputArea();
    input.focus();
  } finally {
    sendInFlight = false;
  }
}

// ==================== INIT ====================
connect();
</script>
