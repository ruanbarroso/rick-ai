<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessoes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1923;
  --surface: #1a2332;
  --surface2: #243447;
  --text: #e1e8ed;
  --text2: #8899a6;
  --accent: #1da1f2;
  --border: #2d3f50;
  --agent: #1e3a4f;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text2);
  overflow: hidden;
}

.header-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.header-info { flex: 1; min-width: 0; }
.header-name { font-weight: 600; font-size: 16px; }
.header-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.session-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  text-decoration: none;
  color: inherit;
  display: block;
  transition: border-color 0.2s, background 0.2s;
}

.session-card:hover {
  border-color: var(--accent);
  background: var(--surface2);
}

.session-card.highlighted {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(29, 161, 242, 0.3);
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.card-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--agent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.card-avatar svg { width: 18px; height: 18px; fill: var(--text2); }

.card-name {
  font-weight: 600;
  font-size: 14px;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.card-status.active, .card-status.running, .card-status.starting {
  background: rgba(74, 222, 128, 0.15);
  color: #4ade80;
}

.card-status.waiting_user {
  background: rgba(29, 161, 242, 0.15);
  color: #1da1f2;
}

.card-status.done,
.card-status.failed,
.card-status.killed, .card-status.error {
  background: rgba(107, 114, 128, 0.15);
  color: #9ca3af;
}

.card-task {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-task.empty { color: var(--text2); font-style: italic; }

.card-meta {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--text2);
}

.card-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Loading / error states */
.state-message {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-size: 15px;
}

.state-message.error { color: #fca5a5; }

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Kill button */
.card-kill {
  background: none;
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #ef4444;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}

.card-kill:hover {
  background: rgba(239, 68, 68, 0.15);
  border-color: #ef4444;
}

.card-kill:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Main session card */
.session-card.main-session {
  background: linear-gradient(135deg, var(--surface) 0%, var(--agent) 100%);
}

.session-card.main-session .card-avatar {
  background: var(--accent);
}

.session-card.main-session .card-avatar svg { fill: #fff; }

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 10px; }
  .session-card { padding: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon" id="header-icon">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 9V7c0-1.1-.9-2-2-2h-3c0-1.66-1.34-3-3-3S9 3.34 9 5H6c-1.1 0-2 .9-2 2v2c-1.66 0-3 1.34-3 3s1.34 3 3 3v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4c1.66 0 3-1.34 3-3s-1.34-3-3-3zM7.5 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S9.83 13 9 13s-1.5-.67-1.5-1.5zM16 17H8v-2h8v2zm-1-4c-.83 0-1.5-.67-1.5-1.5S14.17 10 15 10s1.5.67 1.5 1.5S15.83 13 15 13z"/></svg>
  </div>
  <div class="header-info">
    <div class="header-name" id="header-name">Sessoes</div>
    <div class="header-subtitle" id="header-subtitle">Carregando...</div>
  </div>
</div>

<div class="container" id="container">
  <div class="state-message" id="loading">
    <div class="spinner"></div>
    Carregando sessoes...
  </div>
</div>

<script>
// ==================== VARIANT NAMES ====================
// Variant names are now computed server-side and returned in the API response.
// This function is only a fallback for old sessions without a stored variant_name.
function sessionDisplayName(session, agentName) {
  if (session.variantName) return session.variantName;
  return (agentName || 'Sub-agente') + ' #' + session.id.substring(0, 6);
}

// ==================== HELPERS ====================
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  var now = new Date();
  var sameDay = d.toDateString() === now.toDateString();
  var yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  var isYesterday = d.toDateString() === yesterday.toDateString();

  var time = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

  if (sameDay) return 'Hoje, ' + time;
  if (isYesterday) return 'Ontem, ' + time;
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) + ', ' + time;
}

function statusLabel(status) {
  var labels = {
    active: 'Online',
    running: 'Online',
    starting: 'Iniciando',
    waiting_user: 'Aguardando',
    done: 'Encerrado',
    failed: 'Erro',
    killed: 'Encerrado',
    error: 'Erro'
  };
  return labels[status] || status;
}

function statusClass(status) {
  if (status === 'active' || status === 'running' || status === 'starting') return 'active';
  return status;
}

function isActive(status) {
  return status === 'active' || status === 'running' || status === 'starting' || status === 'waiting_user';
}

// ==================== KILL SESSION ====================
function killSession(sessionId, btn) {
  if (!confirm('Encerrar esta sessao?')) return;
  btn.disabled = true;
  btn.textContent = '...';

  fetch('/api/sessions/' + token + '/kill/' + sessionId, { method: 'POST' })
    .then(function(resp) {
      if (!resp.ok) throw new Error('Erro ' + resp.status);
      return resp.json();
    })
    .then(function() {
      // Update the card UI immediately
      var card = document.getElementById('session-' + sessionId);
      if (card) {
        var statusEl = card.querySelector('.card-status');
        if (statusEl) {
          statusEl.className = 'card-status killed';
          statusEl.textContent = 'Encerrado';
        }
        btn.remove();
      }
    })
    .catch(function(err) {
      alert('Erro ao encerrar: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Encerrar';
    });
}

// ==================== RENDERING ====================
var token = location.pathname.replace(/^\/u\//, '');
var highlightId = location.hash ? location.hash.substring(1) : null;

function renderSessions(agentName, agentLogo, mainSessionName, sessions) {
  document.title = agentName + ' - Sessoes';
  document.getElementById('header-name').textContent = agentName;
  // +1 for the main session
  var totalCount = sessions.length + 1;
  document.getElementById('header-subtitle').textContent = totalCount + ' sessao' + (totalCount !== 1 ? 'es' : '');

  // Set logo if available
  if (agentLogo && agentLogo.length > 10) {
    var iconEl = document.getElementById('header-icon');
    iconEl.innerHTML = '<img src="' + agentLogo + '" alt="' + escapeHtml(agentName) + '">';
  }

  var container = document.getElementById('container');
  container.innerHTML = '';

  // Main session card — always first, always active, links to /m/:token
  var mainCard = document.createElement('a');
  mainCard.href = '/m/' + token;
  mainCard.className = 'session-card main-session';
  mainCard.innerHTML =
    '<div class="card-top">' +
      '<div class="card-avatar"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg></div>' +
      '<span class="card-name">' + escapeHtml(mainSessionName) + '</span>' +
      '<span class="card-status active">Online</span>' +
    '</div>' +
    '<div class="card-task">Sessao principal</div>';
  container.appendChild(mainCard);

  var highlightEl = null;

  for (var i = 0; i < sessions.length; i++) {
    var s = sessions[i];
    var variantName = sessionDisplayName(s, agentName);
    var isHighlighted = highlightId && s.id === highlightId;
    var canKill = isActive(s.status);

    var card = document.createElement('a');
    card.href = '/s/' + s.id + '?t=' + token;
    card.className = 'session-card' + (isHighlighted ? ' highlighted' : '');
    card.id = 'session-' + s.id;

    var taskText = s.task ? escapeHtml(s.task) : 'Sessao sem tarefa definida';
    var taskClass = s.task ? '' : ' empty';

    var timeLabel = formatDate(s.lastMessageAt || s.startedAt);

    card.innerHTML =
      '<div class="card-top">' +
        '<div class="card-avatar"><svg viewBox="0 0 24 24"><path d="M20 9V7c0-1.1-.9-2-2-2h-3c0-1.66-1.34-3-3-3S9 3.34 9 5H6c-1.1 0-2 .9-2 2v2c-1.66 0-3 1.34-3 3s1.34 3 3 3v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4c1.66 0 3-1.34 3-3s-1.34-3-3-3zM7.5 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S9.83 13 9 13s-1.5-.67-1.5-1.5zM16 17H8v-2h8v2zm-1-4c-.83 0-1.5-.67-1.5-1.5S14.17 10 15 10s1.5.67 1.5 1.5S15.83 13 15 13z"/></svg></div>' +
        '<span class="card-name">' + escapeHtml(variantName) + '</span>' +
        '<span class="card-status ' + statusClass(s.status) + '">' + statusLabel(s.status) + '</span>' +
      '</div>' +
      '<div class="card-task' + taskClass + '">' + taskText + '</div>' +
      '<div class="card-meta">' +
        '<span>' + timeLabel + '</span>' +
        (s.connectorName ? '<span>' + escapeHtml(s.connectorName) + '</span>' : '') +
      '</div>';

    container.appendChild(card);

    // Add kill button for active sessions (after appending to DOM)
    if (canKill) {
      (function(sid) {
        var killBtn = document.createElement('button');
        killBtn.className = 'card-kill';
        killBtn.textContent = 'Encerrar';
        killBtn.onclick = function(e) {
          e.preventDefault();
          e.stopPropagation();
          killSession(sid, this);
        };
        card.querySelector('.card-meta').appendChild(killBtn);
      })(s.id);
    }

    if (isHighlighted) highlightEl = card;
  }

  // Scroll to highlighted session, then clean the hash from the URL
  if (highlightEl) {
    setTimeout(function() {
      highlightEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      history.replaceState(null, '', location.pathname + location.search);
    }, 100);
  }
}

function showError(msg) {
  var container = document.getElementById('container');
  container.innerHTML = '<div class="state-message error">' + escapeHtml(msg) + '</div>';
}

// ==================== FETCH ====================
fetch('/api/sessions/' + token)
  .then(function(resp) {
    if (!resp.ok) {
      if (resp.status === 404) throw new Error('Link invalido ou expirado.');
      throw new Error('Erro ao carregar sessoes (' + resp.status + ')');
    }
    return resp.json();
  })
  .then(function(data) {
    var mainName = data.mainSessionName || (data.agentName || 'Agent') + ' Alpha';
    renderSessions(data.agentName || 'Sub-agente', data.agentLogo || '', mainName, data.sessions || []);
  })
  .catch(function(err) {
    showError(err.message || 'Erro desconhecido');
  });
</script>
</body>
</html>
