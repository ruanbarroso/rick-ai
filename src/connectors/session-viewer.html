<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick AI - Sessao</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1923;
  --surface: #1a2332;
  --surface2: #243447;
  --text: #e1e8ed;
  --text2: #8899a6;
  --accent: #1da1f2;
  --agent: #1e3a4f;
  --user: #1da1f2;
  --border: #2d3f50;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 60px;
}

.header-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.header-icon.default { background: var(--surface2); color: var(--text2); }

.header-info { flex: 1; min-width: 0; }
.header-name { font-weight: 600; font-size: 16px; }
.header-status {
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.running { background: #4ade80; animation: pulse 2s infinite; }
.status-dot.waiting { background: #1da1f2; }
.status-dot.done { background: #f59e0b; }
.status-dot.offline { background: #6b7280; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Messages */
.messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.message {
  max-width: 85%;
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.45;
  word-wrap: break-word;
  position: relative;
}

.message.agent {
  align-self: flex-start;
  background: var(--agent);
  border-bottom-left-radius: 4px;
}

.message.user {
  align-self: flex-end;
  background: var(--user);
  color: white;
  border-bottom-right-radius: 4px;
}

.message .time {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  text-align: right;
  margin-top: 4px;
}

.message code {
  background: rgba(0,0,0,0.3);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 13px;
}

.message pre {
  background: rgba(0,0,0,0.3);
  padding: 8px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 6px 0;
  font-size: 13px;
}

/* Compose bar */
.compose-bar {
  display: none;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.compose-attach {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, color 0.2s;
}
.compose-attach:hover { background: var(--border); color: var(--text); }

.input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.input-area textarea {
  flex: 1;
  padding: 10px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 42px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text2); }

.input-area button {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.1s, color 0.2s;
}
.input-area button:hover { background: var(--border); color: var(--text); }
.input-area button:active { transform: scale(0.95); }
.input-area button svg { width: 20px; height: 20px; fill: currentColor; }

.input-area button.send-btn {
  background: var(--accent);
  color: white;
}
.input-area button.send-btn:hover { background: #2563eb; }

/* Recording bar */
.recording-bar {
  display: none;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}
.recording-bar.visible { display: flex; }

.recording-cancel, .audio-discard {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.recording-cancel:hover { background: var(--surface2); color: var(--text); }
.audio-discard:hover { background: #ef4444; color: white; }

.recording-indicator {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.recording-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ef4444;
  animation: recBlink 1s infinite;
}
@keyframes recBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.recording-text { font-size: 0.85rem; color: var(--text2); }
.recording-timer { font-size: 0.85rem; color: var(--text); font-variant-numeric: tabular-nums; }

.recording-send, .audio-send {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.recording-send:hover, .audio-send:hover { background: #2563eb; }

/* Audio preview bar */
.audio-preview-bar {
  display: none;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.audio-preview-bar.visible { display: flex; }
.audio-preview-bar audio { flex: 1; height: 36px; min-width: 0; }
.audio-preview-bar .audio-duration { font-size: 0.85rem; color: var(--text2); font-variant-numeric: tabular-nums; flex-shrink: 0; }

/* Attachments preview */
.attachments-preview {
  display: none;
  padding: 8px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.attachments-preview.visible { display: flex; }

.attachment-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 8px;
  max-width: 180px;
}
.attachment-chip img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.attachment-chip .chip-name { font-size: 0.78rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.attachment-chip .chip-remove { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1rem; padding: 0; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
.attachment-chip .chip-remove:hover { background: #ef4444; color: white; }

/* Typing indicator */
.typing-indicator {
  display: none;
  align-self: flex-start;
  padding: 8px 14px;
  background: var(--agent);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
}

.typing-indicator.visible { display: flex; gap: 4px; }

.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text2);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* Connection banner */
.connection-bar {
  display: none;
  text-align: center;
  padding: 6px;
  font-size: 12px;
  background: #b91c1c;
  color: white;
}

.connection-bar.visible { display: block; }

/* Done banner */
.done-banner {
  display: none;
  text-align: center;
  padding: 10px;
  font-size: 14px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  color: var(--text2);
}

.done-banner.visible { display: block; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  font-size: 15px;
  text-align: center;
  padding: 40px;
}

.empty-state.hidden { display: none; }
/* Tool-use terminal block — loaded from /static/tool-blocks.css */
</style>

<body>

<div class="header">
  <div class="header-icon default" id="header-icon">?</div>
  <div class="header-info">
    <div class="header-name" id="header-name">Carregando...</div>
    <div class="header-status">
      <span class="status-dot offline" id="status-dot"></span>
      <span id="status-text">Conectando...</span>
    </div>
  </div>
</div>

<div class="connection-bar" id="connection-bar">Reconectando...</div>

<div class="messages" id="messages">
  <div class="empty-state" id="empty-state">Aguardando mensagem…</div>
  <div class="typing-indicator" id="typing-indicator">
    <span></span><span></span><span></span>
  </div>
</div>

<div class="compose-bar">

    </button>

<script src="/static/tool-blocks.js"></script>
<script>
// ==================== RICK NAMES (must match server + main UI) ====================
/** Variant name suffixes — must match server VARIANT_SUFFIXES and web-ui AGENT_NAMES_SUFFIXES */
var VARIANT_SUFFIXES = ['Prime', 'Alpha', 'Beta', 'Gamma', 'Delta', 'Omega', 'Neo', 'Zero', 'Nova', 'Flux'];

function hashString(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function sessionVariantName(sessionId, agentName) {
  var suffix = VARIANT_SUFFIXES[hashString(sessionId) % VARIANT_SUFFIXES.length];
  return (agentName || 'Sub-agente') + ' ' + suffix;
}

// ==================== STATE ====================
var sessionId = location.pathname.replace(/^\/s\//, '');
var ws = null;
var reconnectAttempts = 0;
var reconnectTimer = null;
var sessionState = 'unknown'; // unknown, running, done, killed
var pendingUserEcho = false; // true after local sendMessage — skip server echo
var sessionName = sessionVariantName(sessionId, null);

document.title = sessionName;
document.getElementById('header-name').textContent = sessionName;

// ==================== RENDERING ====================
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderText(text) {
  var s = escapeHtml(text);
  // Code blocks
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });
  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*([^*]+)\*/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
  // Links
  s = s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#60a5fa">$1</a>');
  // Newlines
  s = s.replace(/\n/g, '<br>');
  return s;
}

// formatToolLine() and makeToolUseBlock() are loaded from /static/tool-blocks.js

function appendToolLine(text, timeStr) {
  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');
  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');
  // Group into existing block or create new
  var prevEl = typing.previousElementSibling;
  var block;
  if (prevEl && prevEl.classList.contains('tool-use-block')) {
    block = prevEl;
  } else {
    block = makeToolUseBlock();
    container.insertBefore(block, typing);
  }
  var body = block.querySelector('.terminal-body');
  var line = document.createElement('div');
  line.className = 'terminal-line';
  line.innerHTML = formatToolLine(text, timeStr);
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
  container.scrollTop = container.scrollHeight;
}

// ==================== MESSAGE RENDERING ====================

function appendMessage(text, role, messageType) {
  // System state messages (e.g. {"state":"done"}) — don't render as bubbles
  if (role === 'system' || messageType === 'system') {
    try { var sys = JSON.parse(text); if (sys.state) updateSessionState(sys.state); } catch(e) {}
    return;
  }

  // Tool use → terminal block
  if (messageType === 'tool_use') {
    var ts = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    appendToolLine(text, ts);
    return;
  }

  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');

  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');

  var div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'agent');
  div.innerHTML = renderText(text);

  var time = document.createElement('div');
  time.className = 'time';
  time.textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  div.appendChild(time);

  container.insertBefore(div, typing);
  container.scrollTop = container.scrollHeight;
}

function appendHistoryMessage(text, role, timestamp, messageType) {
  // System state messages — don't render, just update state
  if (role === 'system' || messageType === 'system') {
    try { var sys = JSON.parse(text); if (sys.state) updateSessionState(sys.state); } catch(e) {}
    return;
  }

  var timeStr = (timestamp ? new Date(timestamp) : new Date())
    .toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  // Tool use → terminal block
  if (messageType === 'tool_use') {
    appendToolLine(text, timeStr);
    return;
  }

  var empty = document.getElementById('empty-state');
  if (empty) empty.classList.add('hidden');

  var container = document.getElementById('messages');
  var typing = document.getElementById('typing-indicator');

  var div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'agent');
  div.innerHTML = renderText(text);

  var time = document.createElement('div');
  time.className = 'time';
  time.textContent = timeStr;
  div.appendChild(time);

  container.insertBefore(div, typing);
}

function updateSessionState(state) {
  sessionState = state;
  var dot = document.getElementById('status-dot');
  var text = document.getElementById('status-text');
  var banner = document.getElementById('done-banner');
  var composeBar = document.querySelector('.compose-bar');
  var attachPreview = document.getElementById('attachments-preview');

  dot.className = 'status-dot';
  if (state === 'running' || state === 'starting') {
    dot.classList.add('running');
    text.textContent = 'Trabalhando...';
    banner.classList.remove('visible');
    composeBar.style.display = 'flex';
  } else if (state === 'waiting_user') {
    dot.classList.add('waiting');
    text.textContent = 'Aguardando sua resposta';
    banner.classList.remove('visible');
    composeBar.style.display = 'flex';
  } else if (state === 'done') {
    dot.classList.add('done');
    text.textContent = 'Concluido';
    banner.textContent = 'Tarefa concluida — somente leitura';
    banner.classList.add('visible');
    composeBar.style.display = 'none';
    attachPreview.classList.remove('visible');
  } else if (state === 'killed') {
    dot.classList.add('offline');
    text.textContent = 'Encerrado';
    banner.textContent = 'Sessao encerrada — somente leitura';
    banner.classList.add('visible');
    composeBar.style.display = 'none';
    attachPreview.classList.remove('visible');
  } else {
    dot.classList.add('offline');
    text.textContent = 'Conectando...';
  }
}

function updateHeaderIcon() {
  var el = document.getElementById('header-icon');
  el.className = 'header-icon default';
  el.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 9V7c0-1.1-.9-2-2-2h-3c0-1.66-1.34-3-3-3S9 3.34 9 5H6c-1.1 0-2 .9-2 2v2c-1.66 0-3 1.34-3 3s1.34 3 3 3v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4c1.66 0 3-1.34 3-3s-1.34-3-3-3zM7.5 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S9.83 13 9 13s-1.5-.67-1.5-1.5zM16 17H8v-2h8v2zm-1-4c-.83 0-1.5-.67-1.5-1.5S14.17 10 15 10s1.5.67 1.5 1.5S15.83 13 15 13z"/></svg>';
}

// ==================== WEBSOCKET ====================
function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = proto + '//' + location.host + '/ws/session?id=' + encodeURIComponent(sessionId);

  ws = new WebSocket(url);

  ws.onopen = function() {
    reconnectAttempts = 0;
    document.getElementById('connection-bar').classList.remove('visible');
    // Preserve existing state on reconnect; on first connect keep 'unknown'
    // (wait for session_info from server to set the real state)
    if (sessionState !== 'unknown') {
      updateSessionState(sessionState);
    }
  };

  ws.onmessage = function(event) {
    var msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'message':
        // Skip echo for user messages already shown locally by sendMessage()
        if (msg.role === 'user' && pendingUserEcho) {
          pendingUserEcho = false;
          break;
        }
        appendMessage(msg.text, msg.role, msg.messageType);
        break;

      case 'session_history':
        // Load existing messages
        var msgs = msg.messages || [];
        for (var i = 0; i < msgs.length; i++) {
          appendHistoryMessage(msgs[i].content, msgs[i].role, msgs[i].created_at, msgs[i].message_type);
        }
        // Scroll to bottom after loading history
        var container = document.getElementById('messages');
        container.scrollTop = container.scrollHeight;
        break;

      case 'session_info':
        if (msg.session) {
          // Update variant name if server provided the agent name
          if (msg.session.agentName) {
            sessionName = sessionVariantName(sessionId, msg.session.agentName);
            document.getElementById('header-name').textContent = sessionName;
            document.title = sessionName;
          }
          updateHeaderIcon();
          updateSessionState(msg.session.state);
        }
        break;
    }
  };

  ws.onclose = function() {
    scheduleReconnect();
  };

  ws.onerror = function() {};
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectAttempts++;
  var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
  document.getElementById('connection-bar').classList.add('visible');
  document.getElementById('connection-bar').textContent = 'Reconectando...';
  reconnectTimer = setTimeout(function() {
    reconnectTimer = null;
    connect();
  }, delay);
}

// ==================== INPUT STATE ====================
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;
var recordingCanceled = false;
var recordingStartedAt = 0;
var recordingTimer = null;
var pendingFiles = [];
var pendingAudio = null;

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function showInputArea() {
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('recording-bar').classList.remove('visible');
  document.getElementById('audio-preview-bar').classList.remove('visible');
}

function formatDuration(seconds) {
  var min = Math.floor(seconds / 60);
  var sec = Math.floor(seconds % 60);
  return min + ':' + (sec < 10 ? '0' + sec : sec);
}

function updateRecordingTimer() {
  var elapsed = Math.floor((Date.now() - recordingStartedAt) / 1000);
  var min = Math.floor(elapsed / 60);
  var sec = elapsed % 60;
  document.getElementById('recording-timer').textContent = min + ':' + (sec < 10 ? '0' + sec : sec);
}

// ==================== AUDIO RECORDING ====================
function startRecording() {
  if (isRecording) return;
  if (pendingAudio) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    var mimeType = 'audio/webm';
    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
    else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';

    mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
    audioChunks = [];
    recordingCanceled = false;

    mediaRecorder.ondataavailable = function(e) {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      if (recordingCanceled) {
        audioChunks = [];
        showInputArea();
        return;
      }
      var blob = new Blob(audioChunks, { type: mimeType });
      var localUrl = URL.createObjectURL(blob);
      pendingAudio = { blob: blob, mimeType: mimeType, localUrl: localUrl };

      var player = document.getElementById('audio-preview-player');
      player.src = localUrl;
      document.getElementById('recording-bar').classList.remove('visible');
      document.getElementById('audio-preview-bar').classList.add('visible');
    };

    mediaRecorder.start();
    isRecording = true;
    recordingStartedAt = Date.now();
    updateRecordingTimer();
    if (recordingTimer) clearInterval(recordingTimer);
    recordingTimer = setInterval(updateRecordingTimer, 1000);
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('recording-bar').classList.add('visible');
  }).catch(function(err) {
    console.error('Mic error:', err);
  });
}

function finishRecording() {
  if (!isRecording) return;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  if (recordingTimer) { clearInterval(recordingTimer); recordingTimer = null; }
}

function cancelRecording() {
  if (!isRecording) return;
  recordingCanceled = true;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  if (recordingTimer) { clearInterval(recordingTimer); recordingTimer = null; }
}

function discardAudio() {
  if (pendingAudio) { URL.revokeObjectURL(pendingAudio.localUrl); pendingAudio = null; }
  var player = document.getElementById('audio-preview-player');
  player.pause(); player.src = '';
  showInputArea();
}

// ==================== FILE ATTACHMENTS ====================
function handleFileSelect(event) {
  var files = event.target.files;
  if (!files || files.length === 0) return;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result.split(',')[1];
        pendingFiles.push({
          base64: base64,
          mimeType: file.type || 'application/octet-stream',
          name: file.name,
          previewUrl: file.type.startsWith('image/') ? e.target.result : null
        });
        renderAttachmentsPreviews();
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
  event.target.value = '';
}

function renderAttachmentsPreviews() {
  var container = document.getElementById('attachments-preview');
  if (pendingFiles.length === 0) { container.classList.remove('visible'); container.innerHTML = ''; return; }
  container.classList.add('visible');
  var html = '';
  for (var i = 0; i < pendingFiles.length; i++) {
    var f = pendingFiles[i];
    html += '<div class="attachment-chip">';
    if (f.previewUrl) html += '<img src="' + f.previewUrl + '" alt="">';
    html += '<span class="chip-name">' + escapeHtml(f.name) + '</span>';
    html += '<button class="chip-remove" onclick="removeFile(' + i + ')" title="Remover">&times;</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function removeFile(index) { pendingFiles.splice(index, 1); renderAttachmentsPreviews(); }
function clearAllFiles() { pendingFiles = []; renderAttachmentsPreviews(); }

// ==================== SEND MESSAGE ====================
function blobToBase64(blob) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
    reader.readAsDataURL(blob);
  });
}

function sendMessage() {
  // Guard: reject sends on ended sessions
  if (sessionState === 'done' || sessionState === 'killed') return;

  var input = document.getElementById('msg-input');
  var text = input.value.trim();

  if (isRecording) return;

  var hasAudio = !!pendingAudio;
  var hasFiles = pendingFiles.length > 0;

  if (!text && !hasAudio && !hasFiles) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  var payload = { type: 'message', text: text };

  // Show user message immediately and flag to skip server echo
  pendingUserEcho = true;
  if (!hasAudio) {
    appendMessage(text || '(arquivo)', 'user');
  } else {
    appendMessage(text || '(audio)', 'user');
  }

  // Build files array
  var filesPayload = [];
  for (var i = 0; i < pendingFiles.length; i++) {
    if (pendingFiles[i].mimeType.startsWith('image/')) {
      filesPayload.push({ base64: pendingFiles[i].base64, mimeType: pendingFiles[i].mimeType });
    }
  }

  if (hasAudio) {
    var aMime = pendingAudio.mimeType;
    blobToBase64(pendingAudio.blob).then(function(base64) {
      payload.audio = base64;
      payload.audioMimeType = aMime.split(';')[0];
      if (filesPayload.length > 0) payload.files = filesPayload;
      ws.send(JSON.stringify(payload));
    });
  } else if (filesPayload.length > 0) {
    payload.files = filesPayload;
    ws.send(JSON.stringify(payload));
  } else {
    ws.send(JSON.stringify(payload));
  }

  // Cleanup
  if (hasAudio) {
    pendingAudio = null;
    var aplayer = document.getElementById('audio-preview-player');
    aplayer.pause(); aplayer.src = '';
  }
  if (hasFiles) clearAllFiles();
  input.value = '';
  autoResize(input);
  showInputArea();
  input.focus();
}

// ==================== INIT ====================
connect();
</script>
